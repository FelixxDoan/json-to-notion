<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Sync - JSON Data Mapper</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.1)',
                        glassBorder: 'rgba(255, 255, 255, 0.2)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #09090b 0%, #171720 100%);
            color: #ececf1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .neon-accent {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #6366f1, transparent);
            opacity: 0.5;
        }

        .log-container::-webkit-scrollbar {
            width: 8px;
        }
        .log-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2); 
            border-radius: 4px;
        }
        .log-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2); 
            border-radius: 4px;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .syncing-glow {
            animation: pulse-glow 2s infinite;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #18181b inset !important;
            -webkit-text-fill-color: white !important;
        }
        
        select option {
            background-color: #18181b;
            color: white;
        }
    </style>
</head>
<body class="antialiased">
    <div class="w-full max-w-4xl mx-auto space-y-8">
        
        <div class="text-center space-y-3">
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
                Data to Notion
            </h1>
            <p class="text-gray-400 text-lg">Dynamic Schema-Driven Importer</p>
        </div>

        <div class="glass-panel rounded-2xl p-6 md:p-8 space-y-8 relative overflow-hidden">
            <div class="neon-accent"></div>
            
            <!-- API & DB Settings -->
            <form id="connectForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-300">Notion Integration Token</label>
                        <input type="password" id="notionToken" required
                            class="input-field w-full rounded-lg px-4 py-3 text-sm"
                            placeholder="secret_...">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-300">Database ID</label>
                        <input type="text" id="databaseId" required
                            class="input-field w-full rounded-lg px-4 py-3 text-sm"
                            placeholder="e.g. ad4b998d3...">
                    </div>
                </div>
                <div class="flex items-center justify-between px-1 text-xs text-gray-500">
                    <p>💾 Saved locally in this browser. Do not use this on a shared computer.</p>
                    <button type="button" id="clearStorageBtn" class="hover:text-red-400 transition-colors hidden font-medium">Clear saved connection</button>
                </div>
                <button type="submit" id="connectBtn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Connect & Fetch Schema
                </button>
            </form>

            <form id="syncForm" class="hidden space-y-8 pt-6 border-t border-gray-800 mt-6">
                
                <!-- File Upload -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-300">Upload JSON File</label>
                    <div class="relative flex items-center justify-center w-full">
                        <label for="jsonFile" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-600 border-opacity-50 rounded-xl cursor-pointer hover:bg-white hover:bg-opacity-5 hover:border-indigo-500 transition-all duration-300">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-8 h-8 mb-3 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                                </svg>
                                <p class="mb-2 text-sm text-gray-400"><span class="font-semibold text-indigo-400">Click to upload</span> or drag and drop</p>
                                <p class="text-xs text-gray-500">JSON files only</p>
                            </div>
                            <input id="jsonFile" type="file" accept=".json" class="hidden" required />
                        </label>
                    </div>
                    <p id="fileName" class="text-sm text-indigo-400 font-medium hidden mt-2 text-center"></p>
                </div>

                <!-- Property Mapping UI -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-white">Database Properties</h3>
                        <button type="button" id="addPropRowBtn" class="btn-secondary px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Add Property mapping
                        </button>
                    </div>
                    <div class="bg-black bg-opacity-30 rounded-xl border border-gray-800 p-4">
                        <div id="propertyMappingContainer" class="space-y-3">
                            <!-- Dynamic rows will go here -->
                        </div>
                    </div>
                </div>

                <!-- Content Mapping UI -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-white">Page Content Blocks</h3>
                        <button type="button" id="addContentRowBtn" class="btn-secondary px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Add Content mapping
                        </button>
                    </div>
                    <div class="bg-black bg-opacity-30 rounded-xl border border-gray-800 p-4">
                        <div id="contentMappingContainer" class="space-y-3">
                            <!-- Dynamic rows will go here -->
                        </div>
                    </div>
                </div>

                <!-- Submit Action -->
                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="btn-primary w-full py-4 rounded-xl text-white font-semibold text-lg flex items-center justify-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Start Sync Process
                    </button>
                </div>
                
                <!-- Progress / Status Area -->
                <div id="statusContainer" class="hidden space-y-4 mt-6 pt-6 border-t border-gray-800">
                    <div class="flex justify-between items-center text-sm font-medium text-gray-300">
                        <span id="statusText">Preparing...</span>
                        <span id="statusCount">0%</span>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-2.5 overflow-hidden">
                        <div id="progressBar" class="bg-gradient-to-r from-indigo-500 to-cyan-400 h-2.5 rounded-full" style="width: 0%; transition: width 0.3s ease;"></div>
                    </div>
                    
                    <div class="bg-black bg-opacity-50 rounded-lg border border-gray-800 p-3 h-40 overflow-y-auto log-container font-mono text-xs text-gray-400 space-y-1 block" id="logContainer">
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Templates -->
    <template id="propertyRowTemplate">
        <div class="flex items-center gap-3 group">
            <select class="input-field flex-1 rounded-lg px-3 py-2 text-sm notion-col" required>
                <!-- Filled dynamically mapped to schema -->
            </select>
            <div class="text-gray-500">←</div>
            <input type="text" class="input-field flex-1 rounded-lg px-3 py-2 text-sm json-key" placeholder="JSON Key Name" required>
            <button type="button" class="text-gray-500 hover:text-red-400 p-2 transition-colors remove-row-btn" aria-label="Remove row">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>
    </template>

    <template id="contentRowTemplate">
        <div class="flex items-center gap-3 group">
            <div class="input-field flex-1 rounded-lg px-3 py-2 text-sm text-gray-400 bg-gray-900 cursor-not-allowed">
                Page Content Block
            </div>
            <div class="text-gray-500">←</div>
            <input type="text" class="input-field flex-1 rounded-lg px-3 py-2 text-sm json-key" placeholder="JSON Key Name" required>
            <button type="button" class="text-gray-500 hover:text-red-400 p-2 transition-colors remove-row-btn" aria-label="Remove row">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>
    </template>

    <script src="/app.js"></script>
</body>
</html>
